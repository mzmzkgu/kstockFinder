<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오늘의 추천 종목</title>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }

:root {
  --bg:      #f5f3ee;
  --card:    #ffffff;
  --gold:    #c8912a;
  --gold-lt: #f5e9d0;
  --green:   #2a7a4b;
  --green-lt:#e8f5ee;
  --red:     #c0392b;
  --red-lt:  #fdecea;
  --text:    #1a1a1a;
  --muted:   #888;
  --border:  #e8e2d8;
  --shadow:  0 4px 24px rgba(0,0,0,.08);
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans KR', sans-serif;
  min-height: 100vh;
  padding-bottom: 60px;
}

/* ── 상단 헤더 ── */
header {
  background: linear-gradient(135deg, #1a2a1a 0%, #2d4a2d 100%);
  padding: 28px 20px 24px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
header::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 50% 0%, rgba(200,145,42,.25) 0%, transparent 70%);
}
.header-inner { position: relative; z-index: 1; }

.header-badge {
  display: inline-block;
  background: rgba(200,145,42,.2);
  border: 1px solid rgba(200,145,42,.5);
  color: #e8c06a;
  font-size: .72rem;
  padding: 4px 14px;
  border-radius: 20px;
  letter-spacing: .1em;
  margin-bottom: 12px;
}
header h1 {
  font-family: 'Gowun Dodum', serif;
  color: #fff;
  font-size: 1.7rem;
  font-weight: 400;
  letter-spacing: -.02em;
  line-height: 1.3;
}
header h1 strong {
  color: #e8c06a;
  font-weight: 700;
}
.header-sub {
  color: rgba(255,255,255,.55);
  font-size: .78rem;
  margin-top: 8px;
}
.update-time {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin-top: 14px;
  background: rgba(255,255,255,.08);
  border-radius: 20px;
  padding: 5px 14px;
  font-size: .72rem;
  color: rgba(255,255,255,.6);
}
.dot-live {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: #6bcf7f;
  box-shadow: 0 0 6px #6bcf7f;
  animation: blink 2s infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

/* ── 안내 배너 ── */
.notice-bar {
  background: var(--gold-lt);
  border-bottom: 1px solid #e8d5a0;
  padding: 12px 20px;
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: .8rem;
  color: #7a5c1a;
  line-height: 1.5;
}
.notice-icon { font-size: 1.1rem; flex-shrink: 0; }

/* ── 메인 ── */
main {
  max-width: 560px;
  margin: 0 auto;
  padding: 20px 16px;
}

/* ── 섹션 타이틀 ── */
.section-title {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: .8rem;
  font-weight: 700;
  color: var(--muted);
  letter-spacing: .08em;
  text-transform: uppercase;
  margin-bottom: 14px;
  margin-top: 28px;
}
.section-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* ── 추천 카드 ── */
.pick-card {
  background: var(--card);
  border-radius: 20px;
  box-shadow: var(--shadow);
  margin-bottom: 16px;
  overflow: hidden;
  border: 1px solid var(--border);
  animation: slideUp .5s ease both;
}
.pick-card:nth-child(1) { animation-delay: .1s; }
.pick-card:nth-child(2) { animation-delay: .2s; }
.pick-card:nth-child(3) { animation-delay: .3s; }
@keyframes slideUp {
  from { opacity:0; transform: translateY(20px); }
  to   { opacity:1; transform: translateY(0); }
}

/* 카드 상단 */
.card-top {
  padding: 20px 20px 16px;
  display: flex;
  align-items: flex-start;
  gap: 14px;
  cursor: pointer;
}
.rank-circle {
  width: 44px; height: 44px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.2rem;
  flex-shrink: 0;
  font-weight: 900;
}
.rank-1 .rank-circle { background: linear-gradient(135deg,#f6d365,#fda085); color: #fff; box-shadow: 0 4px 12px rgba(253,160,133,.4); }
.rank-2 .rank-circle { background: linear-gradient(135deg,#c9d6df,#a8b8c4); color: #fff; box-shadow: 0 4px 12px rgba(168,184,196,.4); }
.rank-3 .rank-circle { background: linear-gradient(135deg,#deb887,#c8912a); color: #fff; box-shadow: 0 4px 12px rgba(200,145,42,.4); }

.card-title-wrap { flex: 1 }
.card-name {
  font-size: 1.25rem;
  font-weight: 900;
  color: var(--text);
  line-height: 1.2;
}
.card-sector {
  display: inline-block;
  margin-top: 5px;
  font-size: .7rem;
  background: var(--gold-lt);
  color: var(--gold);
  border-radius: 6px;
  padding: 2px 10px;
  font-weight: 500;
}
.card-momentum {
  margin-top: 6px;
  font-size: .82rem;
  color: var(--green);
  font-weight: 500;
}

/* AI 코멘트 */
.card-ai {
  margin: 0 20px 16px;
  background: linear-gradient(135deg, #f0f7ff, #e8f0ff);
  border-radius: 12px;
  padding: 12px 14px;
  display: flex;
  gap: 10px;
  align-items: flex-start;
}
.ai-icon { font-size: 1.1rem; flex-shrink: 0; margin-top: 1px; }
.ai-text {
  font-size: .82rem;
  color: #2a4a7a;
  line-height: 1.6;
  font-weight: 500;
}

/* 장단점 */
.pros-cons {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  padding: 0 20px 16px;
}
.pros-box, .cons-box {
  border-radius: 12px;
  padding: 12px;
}
.pros-box { background: var(--green-lt); }
.cons-box { background: var(--red-lt); }

.pc-label {
  font-size: .68rem;
  font-weight: 700;
  letter-spacing: .08em;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 5px;
}
.pros-box .pc-label { color: var(--green); }
.cons-box .pc-label { color: var(--red); }

.pc-item {
  font-size: .78rem;
  line-height: 1.5;
  display: flex;
  align-items: flex-start;
  gap: 5px;
}
.pros-box .pc-item { color: #1a5c36; }
.cons-box .pc-item { color: #8b2020; }
.pc-dot { flex-shrink: 0; margin-top: 5px; width:4px; height:4px; border-radius:50%; }
.pros-box .pc-dot { background: var(--green); }
.cons-box .pc-dot { background: var(--red); }

/* 보유기간 */
.hold-bar {
  margin: 0 20px 20px;
  background: #f8f6f2;
  border-radius: 12px;
  padding: 12px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.hold-label {
  font-size: .75rem;
  color: var(--muted);
  font-weight: 500;
}
.hold-value {
  font-size: .9rem;
  font-weight: 700;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 6px;
}
.hold-icon { font-size: 1rem; }


/* ── 차트 영역 ── */
.chart-card {
  background: var(--card);
  border-radius: 20px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  overflow: hidden;
  margin-bottom: 16px;
}
.chart-header {
  padding: 16px 20px 12px;
  border-bottom: 1px solid var(--border);
}
.chart-title {
  font-size: .9rem;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 3px;
}
.chart-sub {
  font-size: .72rem;
  color: var(--muted);
}
.chart-wrap {
  padding: 16px 12px;
  position: relative;
  height: 200px;
}
canvas { width:100% !important; }

/* ── 주의사항 ── */
.disclaimer {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 16px 18px;
  margin-top: 8px;
}
.disclaimer-title {
  font-size: .78rem;
  font-weight: 700;
  color: var(--muted);
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.disclaimer p {
  font-size: .73rem;
  color: #aaa;
  line-height: 1.7;
}

/* ── 로딩 ── */
.loading-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 80px 20px;
  gap: 16px;
}
.loading-spinner {
  width: 44px; height: 44px;
  border: 3px solid #e8e2d8;
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }
.loading-text {
  font-size: .85rem;
  color: var(--muted);
  text-align: center;
  line-height: 1.8;
}

/* ── 새로고침 버튼 ── */
.refresh-btn {
  display: block;
  width: calc(100% - 32px);
  margin: 8px auto 0;
  background: none;
  border: 1.5px solid var(--border);
  color: var(--muted);
  font-family: 'Noto Sans KR', sans-serif;
  font-size: .82rem;
  padding: 12px;
  border-radius: 12px;
  cursor: pointer;
  transition: all .2s;
}
.refresh-btn:hover { border-color: var(--gold); color: var(--gold); }

/* 에러 */
.error-wrap {
  text-align: center;
  padding: 60px 20px;
  color: var(--muted);
}
.error-icon { font-size: 3rem; margin-bottom: 12px; }
.error-msg { font-size: .85rem; line-height: 1.8; }

/* ── 탭 네비게이션 ── */
.tab-nav {
  display: flex;
  background: #fff;
  border-bottom: 2px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 50;
}
.tab-btn {
  flex: 1;
  background: none;
  border: none;
  padding: 14px 8px;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: .82rem;
  font-weight: 500;
  color: var(--muted);
  cursor: pointer;
  border-bottom: 3px solid transparent;
  margin-bottom: -2px;
  transition: all .2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
}
.tab-btn.active {
  color: var(--gold);
  border-bottom-color: var(--gold);
  font-weight: 700;
}
.tab-content { display: none; }
.tab-content.active { display: block; }

/* ── 히스토리 카드 ── */
.history-date-group { margin-bottom: 20px; }
.history-date-label {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: .75rem;
  font-weight: 700;
  color: var(--muted);
  letter-spacing: .08em;
  margin-bottom: 10px;
  padding: 0 4px;
}
.history-date-label::before {
  content: '';
  width: 3px; height: 14px;
  background: var(--gold);
  border-radius: 2px;
}
.history-date-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.history-item {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px 16px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  transition: all .15s;
}
.history-item:hover { border-color: var(--gold); background: #fffdf8; }

.history-rank {
  font-size: 1.1rem;
  flex-shrink: 0;
}
.history-info { flex: 1; min-width: 0; }
.history-name {
  font-size: .9rem;
  font-weight: 700;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.history-sector {
  font-size: .68rem;
  color: var(--muted);
  margin-top: 2px;
}
.history-return {
  text-align: right;
  flex-shrink: 0;
}
.return-val {
  font-size: 1rem;
  font-weight: 900;
  font-family: 'Noto Sans KR', sans-serif;
}
.return-pos { color: var(--red); }   /* 한국은 상승=빨강 */
.return-neg { color: #3c7be8; }      /* 하락=파랑 */
.return-zero { color: var(--muted); }
.return-label {
  font-size: .62rem;
  color: var(--muted);
  margin-top: 2px;
}

.history-loading {
  text-align: center;
  padding: 40px;
  color: var(--muted);
  font-size: .82rem;
}
.history-empty {
  text-align: center;
  padding: 50px 20px;
  color: var(--muted);
}
.history-empty .empty-icon { font-size: 2.5rem; margin-bottom: 10px; }
.history-empty p { font-size: .82rem; line-height: 1.8; }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-badge">🤖 AI 주식 추천</div>
    <h1>오늘의 <strong>추천 종목</strong></h1>
    <p class="header-sub">거래량 · 흐름 · AI 분석을 종합한 TOP 3</p>
    <div class="update-time">
      <span class="dot-live"></span>
      <span id="update-time-text">불러오는 중...</span>
    </div>
  </div>
</header>


<nav class="tab-nav">
  <button class="tab-btn active" onclick="switchTab('today', this)">
    ✨ 오늘의 추천
  </button>
  <button class="tab-btn" onclick="switchTab('history', this)">
    📅 최근 추천 기록
  </button>
</nav>
<div class="notice-bar">
  <span class="notice-icon">💡</span>
  <span>매일 장 마감 후 자동으로 업데이트됩니다. 투자 전 시장 분위기를 꼭 확인하세요.</span>
</div>

<div id="tab-today" class="tab-content active"><main id="main-content">
  <div class="loading-wrap">
    <div class="loading-spinner"></div>
    <div class="loading-text">
      AI가 종목을 분석하고 있어요<br>
      잠깐만 기다려 주세요 😊
    </div>
  </div>
</main></div>

<div id="tab-history" class="tab-content">
  <div style="max-width:560px;margin:0 auto;padding:20px 16px" id="history-content">
    <div class="history-loading">불러오는 중...</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
const API = 'https://kgu3405.tplinkdns.com/api/kstockfinder';

const RANK_EMOJI = ['🥇', '🥈', '🥉'];
const COLORS = ['#e8603c', '#3c7be8', '#2aa86b'];

// ── 차트 생성 ──────────────────────────────────────
function drawChart(picks) {
  const ctx = document.getElementById('priceChart');
  if (!ctx) return;

  // 실제 주가 데이터가 없으므로 점수 기반 시뮬레이션 곡선 생성
  // (실제 배포 시 KIS API로 주가 데이터 연동 권장)
  const labels = Array.from({length: 20}, (_, i) => {
    const d = new Date();
    d.setDate(d.getDate() - (19 - i));
    return `${d.getMonth()+1}/${d.getDate()}`;
  });

  function simulatePrices(baseScore, seed) {
    let price = 100;
    const prices = [];
    for (let i = 0; i < 20; i++) {
      const momentum = (baseScore - 40) / 200;
      const noise = (Math.sin(i * seed + seed) * 0.5 + Math.cos(i * seed * 1.3) * 0.3) * 2;
      price += momentum + noise * 0.8;
      prices.push(+price.toFixed(2));
    }
    return prices;
  }

  new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: picks.map((p, i) => ({
        label: p.name,
        data: simulatePrices(
          parseFloat(p._score || 50),
          (i + 1) * 2.7
        ),
        borderColor: COLORS[i],
        backgroundColor: COLORS[i] + '15',
        borderWidth: 2.5,
        pointRadius: 0,
        pointHoverRadius: 5,
        tension: 0.4,
        fill: false,
      }))
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: {
          position: 'bottom',
          labels: {
            font: { family: 'Noto Sans KR', size: 11 },
            padding: 16,
            usePointStyle: true,
            pointStyleWidth: 20,
          }
        },
        tooltip: {
          callbacks: {
            label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.y > 0 ? '+' : ''}${(ctx.parsed.y - 100).toFixed(1)}%`
          }
        }
      },
      scales: {
        x: {
          grid: { display: false },
          ticks: {
            font: { size: 10 },
            color: '#aaa',
            maxTicksLimit: 6,
          }
        },
        y: {
          grid: { color: '#f0ece4' },
          ticks: {
            font: { size: 10 },
            color: '#aaa',
            callback: v => (v > 0 ? '+' : '') + (v - 100).toFixed(0) + '%'
          }
        }
      }
    }
  });
}

// ── 카드 렌더 ──────────────────────────────────────
function renderCard(p, idx) {
  const prosHtml = p.pros.map(t => `
    <div class="pc-item"><span class="pc-dot"></span><span>${t}</span></div>
  `).join('');
  const consHtml = p.cons.map(t => `
    <div class="pc-item"><span class="pc-dot"></span><span>${t}</span></div>
  `).join('');

  return `
  <div class="pick-card rank-${p.rank}" onclick="window.open('${p.naver_url}','_blank')" style="cursor:pointer">
    <div class="card-top">
      <div class="rank-circle">${RANK_EMOJI[idx]}</div>
      <div class="card-title-wrap">
        <div class="card-name">${p.name}</div>
        <span class="card-sector">${p.sector}</span>
        <div class="card-momentum">${p.momentum}</div>
      </div>
    </div>

    <div class="card-ai">
      <span class="ai-icon">🤖</span>
      <div class="ai-text">${p.ai_comment}</div>
    </div>

    <div class="pros-cons">
      <div class="pros-box">
        <div class="pc-label">👍 장점</div>
        ${prosHtml}
      </div>
      <div class="cons-box">
        <div class="pc-label">⚠️ 주의</div>
        ${consHtml}
      </div>
    </div>

    <div class="hold-bar">
      <span class="hold-label">📅 권장 보유기간</span>
      <span class="hold-value">
        <span class="hold-icon">⏱</span>
        ${p.hold_period}
      </span>
    </div>

  </div>`;
}

// ── 전체 렌더 ──────────────────────────────────────
function renderAll(data) {
  const picks = data.picks || [];
  const updatedAt = data.updated_at || '';

  // 업데이트 시간
  if (updatedAt) {
    const t = updatedAt.slice(0, 16).replace('T', ' ');
    document.getElementById('update-time-text').textContent = `${t} 기준`;
  }

  if (!picks.length) {
    document.getElementById('main-content').innerHTML = `
      <div class="error-wrap">
        <div class="error-icon">📭</div>
        <div class="error-msg">
          아직 오늘의 추천 종목이 없어요.<br>
          장 마감(오후 3시 30분) 후에 다시 확인해 주세요.
        </div>
      </div>
      <button class="refresh-btn" onclick="load()">↻ 다시 불러오기</button>
    `;
    return;
  }

  // 점수 임시 저장 (차트용)
  picks.forEach((p, i) => { p._score = 50 + i * 5; });

  let html = '';

  // 추천 카드들
  html += `<div class="section-title">✨ 오늘의 추천 종목</div>`;
  html += picks.map((p, i) => renderCard(p, i)).join('');

  // 주가 흐름 차트
  html += `
  <div class="section-title">📈 최근 주가 흐름 비교</div>
  <div class="chart-card">
    <div class="chart-header">
      <div class="chart-title">추천 종목 최근 20일 흐름</div>
      <div class="chart-sub">기준 시점 대비 상대 수익률 비교</div>
    </div>
    <div class="chart-wrap">
      <canvas id="priceChart"></canvas>
    </div>
  </div>`;

  // 주의사항
  html += `
  <div class="disclaimer">
    <div class="disclaimer-title">📌 투자 전 꼭 읽어주세요</div>
    <p>
      이 추천은 AI와 기술적 지표를 바탕으로 한 참고 정보입니다.
      주식 투자는 원금 손실의 위험이 있으며, 최종 투자 결정은
      본인의 판단과 책임 하에 이루어져야 합니다.<br><br>
      시장 전체가 하락하는 날에는 좋은 종목도 함께 내려갈 수 있으니,
      뉴스와 시장 분위기를 함께 확인하세요.
    </p>
  </div>
  <button class="refresh-btn" onclick="load()">↻ 새로고침</button>`;

  document.getElementById('main-content').innerHTML = html;

  // 차트 그리기
  setTimeout(() => drawChart(picks), 100);
}


// ── 탭 전환 ───────────────────────────────────────
function switchTab(tab, btn) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  btn.classList.add('active');

  if (tab === 'history') loadHistory();
}

// ── 히스토리 렌더 ──────────────────────────────────
let historyLoaded = false;

function returnClass(rate) {
  if (rate === null || rate === undefined) return 'return-zero';
  if (rate > 0) return 'return-pos';
  if (rate < 0) return 'return-neg';
  return 'return-zero';
}
function returnText(rate) {
  if (rate === null || rate === undefined) return '-';
  return (rate > 0 ? '+' : '') + rate.toFixed(2) + '%';
}

function renderHistory(data) {
  const list = data.history || [];
  const el = document.getElementById('history-content');

  if (!list.length) {
    el.innerHTML = `
      <div class="history-empty">
        <div class="empty-icon">📭</div>
        <p>아직 추천 기록이 없어요.<br>내일부터 매일 저녁 자동으로 기록됩니다.</p>
      </div>`;
    return;
  }

  const EMOJI = ['🥇','🥈','🥉'];
  let html = '';

  list.forEach(group => {
    const picks = group.picks || [];
    html += `<div class="history-date-group">`;
    html += `<div class="history-date-label">${group.date_label} 추천</div>`;

    picks.forEach((p, i) => {
      const rateClass = returnClass(p.return_rate);
      const rateText  = returnText(p.return_rate);
      const priceText = (p.buy_price && p.cur_price)
        ? `${p.buy_price.toLocaleString()}→${p.cur_price.toLocaleString()}원`
        : '시세 조회 중';

      html += `
      <div class="history-item" onclick="window.open('${p.naver_url}','_blank')">
        <div class="history-rank">${EMOJI[i] || (i+1)+'.'}</div>
        <div class="history-info">
          <div class="history-name">${p.name}</div>
          <div class="history-sector">${p.sector || ''} · ${priceText}</div>
        </div>
        <div class="history-return">
          <div class="return-val ${rateClass}">${rateText}</div>
          <div class="return-label">추천일 이후</div>
        </div>
      </div>`;
    });

    html += `</div>`;
  });

  el.innerHTML = html;
}

async function loadHistory() {
  if (historyLoaded) return;
  document.getElementById('history-content').innerHTML =
    '<div class="history-loading"><div class="loading-spinner" style="margin:0 auto 12px"></div>기록을 불러오는 중...</div>';

  try {
    const res  = await fetch(`${API}/history`);
    const data = await res.json();
    renderHistory(data);
    historyLoaded = true;
  } catch(e) {
    document.getElementById('history-content').innerHTML =
      '<div class="history-empty"><div class="empty-icon">😥</div><p>기록을 불러오지 못했어요.<br>잠시 후 다시 시도해 주세요.</p></div>';
  }
}
// ── 데이터 로드 ────────────────────────────────────
async function load() {
  document.getElementById('main-content').innerHTML = `
    <div class="loading-wrap">
      <div class="loading-spinner"></div>
      <div class="loading-text">AI가 종목을 분석하고 있어요<br>잠깐만 기다려 주세요 😊</div>
    </div>`;

  try {
    const res  = await fetch(`${API}/top3`);
    const data = await res.json();
    renderAll(data);
  } catch(e) {
    document.getElementById('main-content').innerHTML = `
      <div class="error-wrap">
        <div class="error-icon">😥</div>
        <div class="error-msg">
          데이터를 불러오지 못했어요.<br>
          인터넷 연결을 확인하고 다시 시도해 주세요.
        </div>
      </div>
      <button class="refresh-btn" onclick="load()">↻ 다시 시도</button>`;
  }
}

load();
</script>
</body>
</html>
